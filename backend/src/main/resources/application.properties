spring.application.name=InvestmentSentimentAnalyser
server.port=8081

# Database Configuration (Defaults to H2, overridden by env variables in prod)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:jse_sentiment_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update

# Enable H2 Web Console for administration/debugging (Disabled by default in production)
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Custom Sentiment Analyzer & Pruning Configuration
nlp.corenlp.enabled=${NLP_CORENLP_ENABLED:true}
nlp.corenlp.timeout-ms=1500
news.scrape.interval-ms=300000
news.db.prune-hours=${NEWS_DB_PRUNE_HOURS:72}
